<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <h1>Quick Login for Smart Waste Monitoring</h1>
    <div class="container">
        <p>Click the button below to set the login credentials in localStorage.</p>
        <button id="loginButton">Set Login Credentials</button>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('loginButton').addEventListener('click', function() {
            const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1aWQiOiI2OTdmZmM0MWI4MDAwM2IzYjViYjg3YjUiLCJyb2xlIjoiYWRtaW4iLCJlbWFpbCI6ImFkbWluQGdtYWlsLmNvbSIsImlhdCI6MTc3MzA1MTc3OSwiZXhwIjoxNzczNjU2NTc5fQ.q9y3PbxCOxazy3vc0jZbeuudbxYkCrEck6-NOuD_fws';

                about: 'SMART CLEAN',
                tasksCompleted: 0,

            messageDiv.className = 'message success';

            setTimeout(() => {
                window.location.href = 'index.html';

</body>
</html>
