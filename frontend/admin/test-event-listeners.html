<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listeners Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .warning {
            background-color: #fff3cd;
            color: #856404;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .loading {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Listeners Test Page</h1>
        
        <div class="test-section">
            <h2>Test Instructions</h2>
            <p>This page will test if the event listeners for the dashboard are properly configured.</p>
            <p>Please click the button below to start the test.</p>
            <button id="startTest">Start Test</button>
        </div>

        <div class="test-section">
            <h2>Test Results</h2>
            <div id="testResults"></div>
        </div>

        <div class="test-section">
            <h2>Console Output</h2>
            <div id="consoleOutput" style="font-family: monospace; white-space: pre; background-color: #f0f0f0; padding: 10px; border-radius: 5px; height: 300px; overflow-y: scroll;"></div>
        </div>
    </div>

    <script>
        // Redirect to dashboard first to set up authentication
        if (!localStorage.getItem('adminAuthToken')) {
            window.location.href = 'set-token.html';
        }

        const startTestBtn = document.getElementById('startTest');
        const testResultsDiv = document.getElementById('testResults');
        const consoleOutputDiv = document.getElementById('consoleOutput');

        // Override console.log to capture output
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function logToScreen(message, type = 'log') {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toISOString().split('T')[1]}] ${message}`;
            
            if (type === 'error') {
                div.className = 'test-result error';
            } else if (type === 'warn') {
                div.className = 'test-result warning';
            } else {
                div.className = 'test-result success';
            }
            
            consoleOutputDiv.appendChild(div);
            consoleOutputDiv.scrollTop = consoleOutputDiv.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            logToScreen(args.join(' '));
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            logToScreen(args.join(' '), 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            logToScreen(args.join(' '), 'warn');
        };

        // Test function
        async function runTest() {
            startTestBtn.disabled = true;
            startTestBtn.textContent = 'Testing...';
            testResultsDiv.innerHTML = '';
            consoleOutputDiv.innerHTML = '';

            console.log('=== STARTING EVENT LISTENERS TEST ===');

            // Open dashboard in iframe to test
            const iframe = document.createElement('iframe');
            iframe.src = 'index.html';
            iframe.style.display = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '500px';
            
            document.body.appendChild(iframe);

            iframe.onload = function() {
                setTimeout(() => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        console.log('Dashboard loaded');

                        // Test elements
                        const elementsToTest = [
                            { id: 'addBinBtn', name: 'Add Bin Button' },
                            { id: 'addBinForm', name: 'Add Bin Form' },
                            { id: 'editBinForm', name: 'Edit Bin Form' },
                            { id: 'createTaskBtn', name: 'Create Task Button' },
                            { id: 'createTaskForm', name: 'Create Task Form' },
                            { id: 'addUserBtn', name: 'Add User Button' },
                            { id: 'addUserForm', name: 'Add User Form' },
                            { id: 'editUserForm', name: 'Edit User Form' },
                            { id: 'markAllReadBtn', name: 'Mark All Read Button' },
                            { id: 'saveThresholdsBtn', name: 'Save Thresholds Button' },
                            { id: 'binStatusFilter', name: 'Bin Status Filter' },
                            { id: 'binAreaFilter', name: 'Bin Area Filter' },
                            { id: 'taskStatusFilter', name: 'Task Status Filter' },
                            { id: 'taskPriorityFilter', name: 'Task Priority Filter' },
                            { id: 'messageTypeFilter', name: 'Message Type Filter' },
                            { id: 'messageSenderFilter', name: 'Message Sender Filter' },
                            { id: 'userRoleFilter', name: 'User Role Filter' }
                        ];

                        elementsToTest.forEach(element => {
                            const el = iframeDoc.getElementById(element.id);
                            if (el) {
                                console.log(`✅ ${element.name} (${element.id}) found`);
                            } else {
                                console.error(`❌ ${element.name} (${element.id}) NOT found`);
                            }
                        });

                        // Test navigation links
                        const navLinks = iframeDoc.querySelectorAll('.nav-link');
                        console.log(`\nFound ${navLinks.length} navigation links:`);
                        navLinks.forEach(link => {
                            const section = link.dataset.section;
                            console.log(`  - ${section}`);
                        });

                    } catch (error) {
                        console.error('Error testing dashboard:', error);
                    }

                    document.body.removeChild(iframe);
                    startTestBtn.disabled = false;
                    startTestBtn.textContent = 'Start Test';
                    console.log('=== TEST COMPLETE ===');
                }, 3000);
            };
        }

        startTestBtn.addEventListener('click', runTest);
    </script>
</body>
</html>
